[ids]
*

[main]
# 1. 交换左 Ctrl 和左 Alt (复刻 swap_lctrl_lalt.ahk)
leftcontrol = leftalt
leftalt = leftcontrol

# 2. CapsLock: 长按进入 nav 层，单击触发 Esc
capslock = overload(nav, esc)

[nav]
# --- 方向与跳跃  ---
h = left
j = down
k = up
l = right
w = up
s = down

# --- 翻页 / Home End  ---
u = pageup
n = pagedown
y = home
i = end

# --- Alt + 上/下 (如资源管理器/浏览器后退前进) ---
leftbrace = A-up
rightbrace = A-down

# --- 删除  ---
q = backspace
e = delete

# --- 词级跳跃 (Ctrl + 方向) ---
# 使用 C- 前缀确保是组合键
a = C-left
d = C-right

# --- 字符级选中 (Shift + 方向) ---
b = S-left
m = S-right

# --- 词级选中 (Ctrl + Shift + 方向) ---
# 使用 C-S- 前缀
comma = C-S-left
dot = C-S-right

# --- 撤销 / 重做 (Ctrl+Z / Ctrl+Shift+Z) ---
z = C-z
x = C-S-z


# --- 关闭窗口 (Alt + F4) ---
space = A-f4
esc = A-f4
rightalt = A-f4

# --- 区域截图到剪贴板 ---
# Ubuntu 默认：Ctrl+Shift+PrintScreen 为区域截图到剪贴板
c = C-S-sysrq

# --- 鼠标 ---
f = leftmouse
g = rightmouse
r = scrollup
v = scrolldown

# --- 特殊逻辑：Caps + 物理 Ctrl/Alt 键 ---
leftcontrol = C-S-left
leftalt = C-S-right
