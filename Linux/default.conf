[ids]
*

[main]
# 1. 交换左 Ctrl 和左 Alt (复刻 swap_lctrl_lalt.ahk)
leftcontrol = leftalt
leftalt = leftcontrol

# 2. CapsLock: 长按进入 nav 层，单击触发 Esc
capslock = overload(nav, esc)

[nav]
# --- 方向与跳跃 (已确认工作) ---
h = left
j = down
k = up
l = right
w = up
s = down

# --- 翻页 / Home End (已确认工作) ---
u = pageup
n = pagedown
y = home
i = end

# --- 删除 (已确认工作) ---
q = backspace
e = delete

# --- 词级跳跃 (Ctrl + 方向) ---
# 使用 C- 前缀确保是组合键
a = C-left
d = C-right

# --- 字符级选中 (Shift + 方向) ---
b = S-left
m = S-right

# --- 词级选中 (Ctrl + Shift + 方向) ---
# 使用 C-S- 前缀
comma = C-S-left
dot = C-S-right

# --- 撤销 / 重做 (Ctrl+Z / Ctrl+Y) ---
z = C-z
# 注意：Linux 下很多应用的“重做”是 Ctrl+Shift+Z，如果 C-y 不行，请改为 C-S-z
x = C-y

# --- 关闭窗口 (Alt + F4) ---
space = A-f4
esc = A-f4
rightalt = A-f4

# --- 区域截图 ---
# Ubuntu 20.04 默认区域截图到剪贴板是 Ctrl+Shift+PrintScreen
# 如果你想复刻 Win+Shift+S，请确保你在“系统设置->键盘快捷键”里把截图设为了 Super+Shift+S
c = S-sysrq

# --- 鼠标 ---
f = leftmouse
g = rightmouse
r = scrollup
v = scrolldown

# --- 特殊逻辑：Caps + 物理 Ctrl/Alt 键 ---
# 由于 main 层交换了 Ctrl/Alt，这里建议直接指定物理位置的功能
leftcontrol = C-S-left
leftalt = C-S-right
